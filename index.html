<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DAIS Internal Fee Tool V3.11</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0}
.header{background:#0b2f57;color:#fff;padding:18px}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}

/* Two-column layout for incomes */
.income-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
@media (max-width: 768px) { .income-layout { grid-template-columns: 1fr; gap: 20px; } }

.category-title { color: #0b2f57; font-size: 1.1em; font-weight: bold; margin-top: 15px; margin-bottom: 10px; }
.check-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 0.95em; cursor: pointer; }
.check-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }

input[type="text"], select{width:100%; padding:10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
.btn{color:#fff;border:none;padding:12px 18px;border-radius:6px;cursor:pointer; margin-top: 5px; font-weight: bold;}
pre{white-space:pre-wrap;background:#eef6ff;padding:15px;border-radius:8px; font-family: monospace; font-size: 14px;}

/* Template is kept purely for data binding, never displayed on screen */
#pdf-template { display: none; }

/* Print Media Query - Simple UI hiding for standard Ctrl+P */
@media print {
    body { background: #fff; margin: 0; padding: 0;}
    .header, .container { display: none !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>
</head>
<body>
<div class="header"><h1>DAIS Internal Fee Quotation Tool V3.11</h1></div>
<div class="container">

<div class="card">
<div class="grid-top">
<input type="text" id="clientName" placeholder="Client Name">
<input type="text" id="mobile" placeholder="Mobile">
<input type="text" id="staff" placeholder="Handled By">
<input type="text" id="ay" value="AY 2026-27">
<select id="gst"><option>No GST</option><option>GST Registered</option></select>
</div>
</div>

<div class="card">
<h2 style="color: #0b2f57; margin-top: 0; margin-bottom: 20px;">Income Sources</h2>

<div class="income-layout">
    <div class="col">
        <div class="category-title">Salary & Property</div>
        <label class="check-row"><span>Salary / Pension</span> <input type="checkbox" id="salary"></label>
        <label class="check-row"><span>One House Property</span> <input type="checkbox" id="onehp"></label>
        <label class="check-row"><span>Multiple House Properties</span> <input type="checkbox" id="multihp"></label>

        <div class="category-title">Other Sources</div>
        <label class="check-row"><span>Interest Income</span> <input type="checkbox" id="interest"></label>
        <label class="check-row"><span>Dividend Income</span> <input type="checkbox" id="dividend"></label>
        <label class="check-row"><span>Family Pension</span> <input type="checkbox" id="familypension"></label>

        <div class="category-title">Capital Gains</div>
        <label class="check-row"><span>Mutual Funds</span> <input type="checkbox" id="mf"></label>
        <label class="check-row"><span>Shares</span> <input type="checkbox" id="shares"></label>
        <label class="check-row"><span>Property Sale</span> <input type="checkbox" id="property"></label>
    </div>

    <div class="col">
        <div class="category-title">Business & Profession</div>
        <label class="check-row"><span>Business Income</span> <input type="checkbox" id="business"></label>
        <label class="check-row"><span>Professional Income</span> <input type="checkbox" id="professional"></label>
        <label class="check-row"><span>Presumptive 44AD</span> <input type="checkbox" id="ad"></label>
        <label class="check-row"><span>Presumptive 44ADA</span> <input type="checkbox" id="ada"></label>

        <div class="category-title">Special Cases & Compliance</div>
        <label class="check-row"><span>F&O Trading</span> <input type="checkbox" id="fo"></label>
        <label class="check-row"><span>Intraday Trading</span> <input type="checkbox" id="intraday"></label>
        <label class="check-row"><span>Foreign Assets</span> <input type="checkbox" id="foreignasset"></label>
        <label class="check-row"><span>Foreign Income / NRI / DTAA</span> <input type="checkbox" id="foreignincome"></label>
        <label class="check-row"><span>ESOP</span> <input type="checkbox" id="esop"></label>
        <label class="check-row"><span>Crypto</span> <input type="checkbox" id="crypto"></label>
        <label class="check-row"><span>Tax Notice</span> <input type="checkbox" id="notice"></label>
        <label class="check-row"><span>Revised Return</span> <input type="checkbox" id="revised"></label>
    </div>
</div>
</div>

<div class="card">
<div class="grid-top" style="align-items: center; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
<div>
  <label style="font-weight:bold; display:block; margin-bottom:5px;">Demat Accounts</label>
  <select id="demat">
  <option>None</option><option>1</option><option>2-3</option><option>4+</option>
  </select>
</div>
<div>
  <label style="font-weight:bold; display:block; margin-bottom:5px;">Share/MF Transactions</label>
  <select id="shareTxn">
  <option>None</option><option>1-50</option><option>51-500</option><option>500+</option>
  </select>
</div>
<div>
  <label style="font-weight:bold; display:block; margin-bottom:5px;">Properties Transacted</label>
  <select id="propTxn">
  <option>None</option><option>1</option><option>2-3</option><option>4+</option>
  </select>
</div>
</div><br>
<button class="btn" style="background:#0b2f57; width: 100%; font-size: 1.1em;" onclick="calc()">Generate Assessment</button>
</div>

<div class="card">
<pre id="out">Generate Assessment to view result.</pre>
<div id="actions" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
</div>

</div>

<div id="pdf-template">
    <span id="pdf-date"></span>
    <span id="pdf-client"></span>
    <span id="pdf-mobile"></span>
    <span id="pdf-ay"></span>
    <span id="pdf-staff"></span>
    <span id="pdf-itr"></span>
    <span id="pdf-gst"></span>
    <span id="pdf-demat"></span>
    <span id="pdf-shareTxn"></span>
    <span id="pdf-propTxn"></span>
    <span id="pdf-risk"></span>
    <span id="pdf-base"></span>
    <span id="pdf-load"></span>
    <span id="pdf-total"></span>
    <div id="pdf-incomes"></div>
</div>

<script>
function calc(){
const g=id=>document.getElementById(id);
let itr='ITR-1',base=1000,load=0,risk='LOW';
let triggers=[];

const categories = {
    'Salary & Property': [['salary', 'Salary / Pension'], ['onehp', 'One House Property'], ['multihp', 'Multiple House Properties']],
    'Business & Profession': [['business', 'Business Income'], ['professional', 'Professional Income'], ['ad', 'Presumptive 44AD'], ['ada', 'Presumptive 44ADA']],
    'Capital Gains': [['mf', 'Mutual Fund Capital Gains'], ['shares', 'Share Capital Gains'], ['property', 'Property Capital Gains']],
    'Other Sources': [['interest', 'Interest Income'], ['dividend', 'Dividend Income'], ['familypension', 'Family Pension']],
    'Special Cases & Compliance': [['fo', 'F&O Trading'], ['intraday', 'Intraday Trading'], ['foreignasset', 'Foreign Assets'], ['foreignincome', 'Foreign Income/NRI/DTAA'], ['esop', 'ESOP'], ['crypto', 'Crypto'], ['notice', 'Tax Notice'], ['revised', 'Revised Return']]
};

let groupedIncomeText = "";
let pdfIncomeHTML = "";

for (const [group, items] of Object.entries(categories)) {
    let groupItems = [];
    items.forEach(x => { 
        if (g(x[0]) && g(x[0]).checked) groupItems.push(x[1]); 
    });
    if (groupItems.length > 0) {
        groupedIncomeText += `\n${group}\n✓ ` + groupItems.join('\n✓ ') + '\n';
        pdfIncomeHTML += `<h4 style="margin: 10px 0 5px; color: #0b2f57; font-size:14px; border-bottom: 1px solid #eee; padding-bottom: 4px;">${group}</h4><ul style="margin: 5px 0 15px 20px; padding: 0; font-size:13px; color: #333;"><li>` + groupItems.join('</li><li>') + `</li></ul>`;
    }
}

const hasSharesMF = g('mf').checked || g('shares').checked;
const hasProperty = g('property').checked;

if(g('foreignincome').checked || (hasSharesMF && g('shareTxn').value==='500+') || (hasProperty && g('propTxn').value==='4+')){
    g('out').textContent='CUSTOM QUOTE REQUIRED (Premium Case)';
    g('actions').innerHTML = '';
    return;
}

const gstApplicable=g('business').checked||g('professional').checked||g('ad').checked||g('ada').checked;
const gstReg=g('gst').value==='GST Registered';

if(g('business').checked||g('professional').checked||g('fo').checked||g('intraday').checked){
 itr='ITR-3'; base=gstReg?2000:1500;
}else if(g('ad').checked||g('ada').checked){
 itr='ITR-4'; base=gstReg?1500:1000;
}else if(g('mf').checked||g('shares').checked||g('property').checked||g('multihp').checked||g('foreignasset').checked||g('dividend').checked){
 itr='ITR-2'; base=1500;
}

if(g('foreignasset').checked){load+=500;triggers.push('✓ Foreign Assets')}
if(g('multihp').checked){load+=500;triggers.push('✓ Multiple House Property')}

if(g('demat').value==='2-3'){load+=500;triggers.push('✓ 2-3 Demat Accounts')}
if(g('demat').value==='4+'){load+=1000;triggers.push('✓ 4+ Demat Accounts')}

if(hasSharesMF && g('shareTxn').value==='51-500'){load+=500;triggers.push('✓ 51-500 Share/MF Txns')}
if(hasProperty && g('propTxn').value==='2-3'){load+=500;triggers.push('✓ 2-3 Property Txns')}

if(g('fo').checked){load+=1000;triggers.push('✓ F&O')}
if(g('intraday').checked){load+=1000;triggers.push('✓ Intraday')}
if(g('esop').checked){load+=1000;triggers.push('✓ ESOP')}
if(g('crypto').checked){load+=1000;triggers.push('✓ Crypto')}
if(g('notice').checked){load+=1000;triggers.push('✓ Notice')}
if(g('revised').checked){load+=1000;triggers.push('✓ Revised Return')}

if(load>0) risk=load>=1000?'HIGH':'MODERATE';

let quote=`📋 *Professional Fee Quotation | DAIS Advisors*

Dear ${g('clientName').value || 'Client'},

*Recommended Professional Fee: ₹${(base+load).toLocaleString('en-IN')}*

Applicable Income Tax Return Category: ${itr}.

Regards,
DAIS Advisors`;

window.currentQuote = quote;
g('out').textContent = quote;

g('pdf-date').textContent = new Date().toLocaleDateString('en-IN');
g('pdf-client').textContent = g('clientName').value || 'N/A';
g('pdf-mobile').textContent = g('mobile').value || 'N/A';
g('pdf-ay').textContent = g('ay').value || 'N/A';
g('pdf-staff').textContent = g('staff').value || 'N/A';
g('pdf-itr').textContent = itr;
g('pdf-gst').textContent = gstReg ? 'Yes' : 'No';
g('pdf-demat').textContent = g('demat').value;
g('pdf-shareTxn').textContent = hasSharesMF ? g('shareTxn').value : 'N/A';
g('pdf-propTxn').textContent = hasProperty ? g('propTxn').value : 'N/A';
g('pdf-risk').textContent = risk;
g('pdf-base').textContent = '₹' + base.toLocaleString('en-IN');
g('pdf-load').textContent = '₹' + load.toLocaleString('en-IN');
g('pdf-total').textContent = '₹' + (base + load).toLocaleString('en-IN');
g('pdf-incomes').innerHTML = pdfIncomeHTML || '<p style="font-size:13px; color:#555;">None Selected</p>';

let wa='https://wa.me/918529081017?text='+encodeURIComponent(quote);
g('actions').innerHTML=`
    <button class="btn" style="background: #25D366;" onclick="window.open('${wa}')">Send to WhatsApp</button>
    <button class="btn" style="background: #d32f2f;" onclick="downloadPDF()">Download PDF Quote</button>
    <button class="btn" style="background: #607d8b;" onclick="navigator.clipboard.writeText(window.currentQuote); alert('Quote successfully copied to clipboard!');">Copy Text</button>
`;
}

function downloadPDF() {
    const clientName = document.getElementById('pdf-client').textContent || 'Client';
    const ay = document.getElementById('pdf-ay').textContent || 'N/A';
    const itr = document.getElementById('pdf-itr').textContent;
    const baseFee = document.getElementById('pdf-base').textContent;
    const loadFee = document.getElementById('pdf-load').textContent;
    const totalFee = document.getElementById('pdf-total').textContent;
    const incomesHTML = document.getElementById('pdf-incomes').innerHTML || '<p style="font-size:13px; color:#555; margin-left: 20px;">None Selected</p>';
    const demat = document.getElementById('pdf-demat').textContent;
    const shareTxn = document.getElementById('pdf-shareTxn').textContent;
    const propTxn = document.getElementById('pdf-propTxn').textContent;

    // RESTORED: Your original tabular layout with new branding!
    const htmlString = `
    <html>
        <head>
            <style>
                body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; padding: 40px; background: #fff; }
                
                /* Prevent blank pages */
                .avoid-break { page-break-inside: avoid; break-inside: avoid; }
                
                /* Premium Branding Header */
                .pdf-header { text-align: center; border-bottom: 3px solid #0b2f57; position: relative; padding-bottom: 15px; margin-bottom: 25px; }
                .pdf-header::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 100%; height: 2px; background-color: #FFC000; }
                .firm-logo { max-height: 80px; margin-bottom: 10px; }
                .pdf-header h1 { color: #0b2f57; margin: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 1px;}
                .pdf-header p { margin: 5px 0 0 0; color: #555; font-size: 14px; font-weight: bold; text-transform: uppercase;}
                
                .pdf-section { margin-bottom: 20px; }
                .section-title { color: #0b2f57; border-bottom: 2px solid #FFC000; padding-bottom: 5px; margin-bottom: 10px; font-size: 16px; font-weight: bold; }
                
                /* Info Table */
                .pdf-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
                .pdf-table th { background-color: #fdfaf0; color: #0b2f57; width: 25%; font-weight: bold; }
                .pdf-table td { width: 25%; }
                
                /* Fee Table */
                .pdf-fee-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #ddd; }
                .pdf-fee-table th, .pdf-fee-table td { padding: 12px; font-size: 15px; border-bottom: 1px solid #eee; text-align: left;}
                .pdf-fee-table th { background-color: #0b2f57; color: white; }
                .pdf-fee-table .amount { text-align: right; }
                .total-row { font-weight: bold; color: #0b2f57; font-size: 18px; border-top: 2px solid #0b2f57; border-bottom: 2px solid #0b2f57; background: #fdfaf0;}
                
                /* Disclaimer */
                .disclaimer-title { font-size: 13px; font-weight: bold; margin-top: 20px; color: #0b2f57; }
                .disclaimer-text { font-size: 12px; margin-top: 5px; color: #555; line-height: 1.5; text-align: justify; }
                .disclaimer-text ul { margin: 5px 0 8px 0; padding-left: 20px; }
                
                /* Footer */
                .pdf-footer { width: 100%; margin-top: 40px; font-size: 12px; color: #666; border-top: 1px solid #ccc; padding-top: 15px; display: flex; justify-content: space-between; }
            </style>
        </head>
        <body>
            <div class="pdf-header avoid-break">
                <img src="LOGO_WHATAPP.png" alt="Dais Advisors Logo" class="firm-logo">
                <h1>DAIS ADVISORS PRIVATE LIMITED</h1>
                <p>PROFESSIONAL FEE QUOTATION</p>
            </div>
            
            <table class="pdf-table avoid-break">
                <tr>
                    <th>Date</th><td>${new Date().toLocaleDateString('en-IN')}</td>
                    <th>Assessment Year</th><td>${ay}</td>
                </tr>
                <tr>
                    <th>Client Name</th><td>${clientName}</td>
                    <th>Mobile</th><td>${document.getElementById('pdf-mobile').textContent || 'N/A'}</td>
                </tr>
                <tr>
                    <th>Applicable ITR</th><td>${itr}</td>
                    <th>GST Registered</th><td>${document.getElementById('pdf-gst').textContent}</td>
                </tr>
            </table>

            <div class="pdf-section avoid-break">
                <div class="section-title">Scope of Work & Income Sources</div>
                ${incomesHTML}
            </div>
            
            <div class="pdf-section avoid-break">
                <div class="section-title">Account Attributes</div>
                <ul style="font-size: 14px; margin-top: 10px; color: #333; padding-left: 20px;">
                    <li><strong>Demat Accounts:</strong> ${demat}</li>
                    <li><strong>Share/MF Transactions:</strong> ${shareTxn}</li>
                    <li><strong>Properties Transacted:</strong> ${propTxn}</li>
                    <li><strong>Risk Level Assessment:</strong> ${document.getElementById('pdf-risk').textContent}</li>
                </ul>
            </div>

            <table class="pdf-fee-table avoid-break">
                <tr>
                    <th>Particulars</th>
                    <th class="amount" style="width: 30%;">Amount (INR)</th>
                </tr>
                <tr>
                    <td style="width: 70%;">Base Professional Fee (${itr})</td>
                    <td class="amount">${baseFee}</td>
                </tr>
                <tr>
                    <td>Complexity Loading (Scope & Volume)</td>
                    <td class="amount">${loadFee}</td>
                </tr>
                <tr class="total-row">
                    <td>Recommended Professional Fee</td>
                    <td class="amount">${totalFee}</td>
                </tr>
            </table>
            
            <div class="avoid-break">
                <div class="disclaimer-title">Disclaimer:</div>
                <div class="disclaimer-text">
                    <p style="margin: 0 0 8px 0;">All applicable statutory dues, taxes, and late filing penalties shall be borne and paid directly by the client.</p>
                    <p style="margin: 0 0 8px 0;">The above professional fees are indicative and based on the information currently available. Final fees may increase depending upon:</p>
                    <ul>
                        <li>Volume of transactions</li>
                        <li>Capital gain calculations</li>
                        <li>Number of Demat accounts</li>
                        <li>Foreign asset reporting</li>
                        <li>GST reconciliation</li>
                        <li>Notices and assessments</li>
                        <li>Revised/Defective returns</li>
                        <li>Additional advisory work</li>
                    </ul>
                    <p style="margin: 0;">Any increase shall be communicated before commencement of additional work.</p>
                </div>
            </div>

            <div class="pdf-footer avoid-break">
                <div>Generated By: <strong>DAIS Internal Fee Tool</strong></div>
                <div>Handled By: <strong>${document.getElementById('pdf-staff').textContent || 'N/A'}</strong></div>
            </div>
        </body>
    </html>
    `;

    // WEB HOSTING FIX: useCORS: true is enabled here
    const opt = {
      margin:       0.4,
      filename: `DAIS_Fee_Quotation_${clientName.replace(/\s+/g,'_')}_${ay.replace(/\s+/g,'')}_${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}${String(new Date().getDate()).padStart(2,'0')}.pdf`,
      image:        { type: 'jpeg', quality: 0.98 },
      html2canvas:  { scale: 2, useCORS: true },
      jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' },
      pagebreak:    { mode: ['css', 'legacy'] } 
    };
    
    html2pdf().set(opt).from(htmlString).save();
}
</script>
</body></html>
